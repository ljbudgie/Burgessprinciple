name: Analyze Changes

on:
  push:
    paths:
      - 'OPENCLAW_MANDATE.md'
      - 'clawbot.py'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run analysis
      run: |
        echo "Analyzing changes to monitored files..."
        # Add analysis script here when ready

    - name: Update OPENCLAW_MANDATE.md
      run: |
        echo "Analysis results logged at $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> OPENCLAW_MANDATE.md

    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add OPENCLAW_MANDATE.md
        git diff --cached --quiet || git commit -m "Updated OPENCLAW_MANDATE.md with analysis results"
        git diff --cached --quiet && echo "No changes to push" || git push
